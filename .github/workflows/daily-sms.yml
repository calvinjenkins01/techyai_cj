name: Daily content SMS

on:
  schedule:
    # Two slots for redundancy: 11:00 UTC (4am Phoenix) and 12:30 UTC (5:30am).
    # GitHub cron can run up to an hour late; both land before the 6am
    # phone automation. The second run is a no-op if the file is already fresh.
    - cron: "0 11 * * *"
    - cron: "30 12 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "What to send"
        type: choice
        options:
          - today
          - week
          - dry_run
        default: today

permissions:
  contents: write

jobs:
  sms:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Write today's checklist file (for iPhone automation)
        run: python daily-sms/send_sms.py --today-file

      - name: Commit today's checklist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add daily-sms/today.txt
          if ! git diff --cached --quiet; then
            git commit -m "Daily checklist $(date -u +%F)"
            git pull --rebase origin main
            git push
          fi

      - name: Send via Twilio (works after account upgrade; trial accounts skip)
        continue-on-error: true
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_NUMBER: ${{ secrets.TWILIO_FROM_NUMBER }}
          MY_PHONE_NUMBER: ${{ secrets.MY_PHONE_NUMBER }}
        run: |
          case "${{ inputs.mode }}" in
            week) python daily-sms/send_sms.py --week ;;
            dry_run) python daily-sms/send_sms.py --dry-run ;;
            *) python daily-sms/send_sms.py ;;
          esac
