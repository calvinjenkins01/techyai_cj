name: X AI-news autoposter

on:
  # Schedule disabled: CJ posts to X manually (Claude writes the articles in chat).
  # To re-enable full automation, restore the cron below and add the API secrets.
  # schedule:
  #   - cron: "0 15 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (generate draft, don't post)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  autopost:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r x-autoposter/requirements.txt

      - name: Generate and post
        working-directory: x-autoposter
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python main.py
          else
            python main.py --post
          fi

      - name: Commit state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add x-autoposter/state.json x-autoposter/drafts/ || true
          git diff --cached --quiet || git commit -m "Record autopost state"
          git push
